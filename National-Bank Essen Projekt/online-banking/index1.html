<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National-Bank</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f5f5f8;
  margin: 0;
}

/* LINKS / NAVBAR */
.links {
  text-align: center;
  margin-top: 15px;
}

.links a {
  margin: 0 10px;
  color: white;
  text-decoration: none;
}

/* ÜBERSCHRIFT */
.Überschrift {
  position: absolute;
  top: 15px;
  left: 120px;
  color: #000;
  margin: 0;
}

/* LOGO */
.banklogo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 80px;
}

/* HINTERGRUND WAVE */
.wave {
  position: absolute;
  left: 0;
  top: 0;
  z-index: -1;
}

/* BANK BOX MITTE */
.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  text-align: center;

  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
}

h1 {
  color: #019E48;
}

#balance {
  font-size: 28px;
  font-weight: bold;
  margin: 20px 0;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
}

button {
  width: 90%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 8px;
  background-color: #019E48;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #016f34;
}
</style>

</head>
<body>

<div class="links">
  <a href="../index.html">Home</a>
  <a href="../Über-uns/index2.html">Über uns</a>
  <a href="index1.html">Online Banking</a>
</div>

<h1 class="Überschrift">National-Bank</h1>
<img class="banklogo" src="icon3.svg">
<img class="wave" src="wave (3).svg">

<!-- BANKING BOX -->
<div class="container">

  <h1>Bank – Mein Konto</h1>

  <h2>Kontostand:</h2>
  <p id="balance">1000 €</p>

  <input type="number" id="amount" placeholder="Betrag eingeben">

  <button onclick="addMoney()">+100 € einzahlen</button>
  <button onclick="addCustomMoney()">Einzahlen</button>
  <button onclick="withdrawMoney()">Abheben</button>

</div>

<!-- JAVASCRIPT -->
<script>
let balance = 1000;

function addMoney() {
  balance += 100;
  document.getElementById("balance").innerText = balance + " €";
}

function addCustomMoney() {
  let amount = Number(document.getElementById("amount").value);
  balance += amount;
  document.getElementById("balance").innerText = balance + " €";
}

function withdrawMoney() {
  let amount = Number(document.getElementById("amount").value);

  if (amount <= 0) {
    alert("Bitte gültigen Betrag eingeben!");
    return;
  }

  balance -= amount;
  document.getElementById("balance").innerText = balance + " €";
}
</script>

</body>
</html>
